<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic Android">
  <defs>
    <linearGradient id="ag" x1="40" y1="28" x2="210" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset=".5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <mask id="eyes">
      <rect width="256" height="256" fill="#fff"/>
      <circle cx="101" cy="80" r="7" fill="#000"/>
      <circle cx="143" cy="80" r="7" fill="#000"/>
    </mask>
  </defs>
  <g fill="url(#ag)">
    <!-- antennae -->
    <path d="M89 56 79 34" stroke="url(#ag)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M155 56 165 34" stroke="url(#ag)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- head dome (flat bottom), eyes punched out -->
    <path d="M68 98 A56 56 0 0 1 176 98 Z" mask="url(#eyes)"/>
    <!-- arms -->
    <rect x="49" y="112" width="14" height="46" rx="7"/>
    <rect x="181" y="112" width="14" height="46" rx="7"/>
    <!-- body -->
    <rect x="68" y="106" width="108" height="62" rx="16"/>
    <!-- speech-bubble tail (bottom-left) -->
    <path d="M86 162 L74 190 L108 162 Z"/>
    <!-- headset boom: from the right ear, curving to the mouthpiece in front -->
    <path d="M188 132 C204 168 186 188 156 182" fill="none" stroke="url(#ag)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="150" cy="180" r="13"/>
  </g>
</svg>
